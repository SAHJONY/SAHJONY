# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hermes-agent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "false"
      # Add these in Render dashboard for production:
      # - key: SUPABASE_URL
      #   sync: false
      # - key: SUPABASE_ANON_KEY
      #   sync: false
      # - key: SUPABASE_SERVICE_ROLE_KEY
      #   sync: false
      # - key: JWT_SECRET
      #   generateValue: true
      # - key: TWENTY_API_KEY
      #   sync: false